# ============================================================================
# LifeOS — Self-hosted Life Management Platform
# ============================================================================
# Deploy:
#   1. Copy .env.example to .env and fill in values
#   2. sudo mkdir -p /srv/lifeos
#   3. docker compose up -d --build
# ============================================================================

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: lifeos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lifeos}
      POSTGRES_USER: ${POSTGRES_USER:-lifeos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - ${DATA_PATH:-/srv/lifeos}/postgres:/var/lib/postgresql/data
      - ./api/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lifeos}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Qdrant Vector Database ────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: lifeos-qdrant
    restart: unless-stopped
    volumes:
      - ${DATA_PATH:-/srv/lifeos}/qdrant:/qdrant/storage
    ports:
      - "127.0.0.1:6334:6333"
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334

  # ── API Service ───────────────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: lifeos-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-lifeos}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-lifeos}
      QDRANT_URL: http://qdrant:6333
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      UPLOAD_DIR: /data/documents
      SECRET_KEY: ${SECRET_KEY:-change-me}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
      INBOX_ENABLED: ${INBOX_ENABLED:-true}
      INBOX_DIR: /data/documents/inbox
      INBOX_POLL_INTERVAL: ${INBOX_POLL_INTERVAL:-10}
      INBOX_STABILITY_SECONDS: ${INBOX_STABILITY_SECONDS:-5}
      # Email forwarding (Phase 3) — leave IMAP_ENABLED=false until creds are set in .env
      IMAP_ENABLED: ${IMAP_ENABLED:-false}
      IMAP_HOST: ${IMAP_HOST:-}
      IMAP_PORT: ${IMAP_PORT:-993}
      IMAP_USERNAME: ${IMAP_USERNAME:-}
      IMAP_PASSWORD: ${IMAP_PASSWORD:-}
      IMAP_MAILBOX: ${IMAP_MAILBOX:-INBOX}
      IMAP_POLL_INTERVAL: ${IMAP_POLL_INTERVAL:-120}
      IMAP_PROCESSED_LABEL: ${IMAP_PROCESSED_LABEL:-LifeOS/Processed}
      IMAP_FAILED_LABEL: ${IMAP_FAILED_LABEL:-LifeOS/Failed}
      # Google Calendar sync (Phase 10)
      GOOGLE_CALENDAR_ENABLED: ${GOOGLE_CALENDAR_ENABLED:-false}
      GOOGLE_CALENDAR_ID: ${GOOGLE_CALENDAR_ID:-primary}
      GOOGLE_CREDENTIALS_PATH: ${GOOGLE_CREDENTIALS_PATH:-/data/auth/google-calendar-tokens.json}
      GOOGLE_OAUTH_CLIENT_PATH: ${GOOGLE_OAUTH_CLIENT_PATH:-/data/auth/google-oauth-client.json}
      GOOGLE_CALENDAR_DOMAINS: ${GOOGLE_CALENDAR_DOMAINS:-}
      GOOGLE_CALENDAR_LINK_BASE: ${GOOGLE_CALENDAR_LINK_BASE:-}
    volumes:
      - ${DATA_PATH:-/srv/lifeos}/documents:/data/documents
      - ${DATA_PATH:-/srv/lifeos}/auth:/data/auth
      # Read-only: the Settings page lists backup tarballs; the API never writes here.
      - ${DATA_PATH:-/srv/lifeos}/backups:/data/backups:ro
    ports:
      - "127.0.0.1:8100:8000"
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: "3"

  # ── MCP Server (Phase: OpenClaw integration) ─────────────────────────
  # Exposes LifeOS over the Model Context Protocol so Claude-based agents
  # (OpenClaw, Claude Desktop) can ask questions, upload docs, and surface
  # upcoming actions. Auth via MCP_AGENT_KEY shared between this server and
  # the agent. Bind to 0.0.0.0 so other machines on the LAN can reach it.
  mcp:
    build:
      context: ./mcp
      dockerfile: Dockerfile
    container_name: lifeos-mcp
    restart: unless-stopped
    depends_on:
      - api
    environment:
      LIFEOS_API_URL: http://api:8000
      MCP_AGENT_KEY: ${MCP_AGENT_KEY:-}
      MCP_PORT: 8200
      MCP_HOST: 0.0.0.0
      # DNS-rebinding host check: empty = off (LAN trust mode, agent key is the
      # security boundary). Set to "lifeos.local,10.0.0.92" to lock down to a
      # specific allowlist.
      MCP_ALLOWED_HOSTS: ${MCP_ALLOWED_HOSTS:-}
    ports:
      - "8200:8200"

  # ── Nginx (Web UI + Reverse Proxy) ────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: lifeos-nginx
    restart: unless-stopped
    depends_on:
      - api
    volumes:
      - ./web/dist:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8180:80"
