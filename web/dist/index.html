            if (!confirm('Delete this document?')) return;
            try {
                await this.api(`/api/documents/${id}`, { method: 'DELETE' });
                this.toast('Document deleted');
                this.navigate('documents');
            } catch {}
        },

        async saveDocEdit() {
            if (!this.currentDoc) return;
            const body = {};
            if (this.editTitle) body.title = this.editTitle;
            if (this.editDomain) body.domain = this.editDomain;
            if (this.editCategory) body.category = this.editCategory;
            if (this.editSubject) body.subject_id = this.editSubject;
            if (this.editDocDate) body.document_date = this.editDocDate;
            if (this.editExpDate) body.expiration_date = this.editExpDate;
            body.tags = this.editTags.split(',').map(t => t.trim()).filter(Boolean);

            try {
                await this.api(`/api/documents/${this.currentDoc.id}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
                this.showEditDoc = false;
                this.toast('Document updated');
                await this.viewDocument(this.currentDoc.id);
            } catch {}
        },

        async reanalyze(id) {
            try {
                await this.api(`/api/documents/${id}/reanalyze`, { method: 'POST' });
                this.toast('Re-analysis started');
                if (this.currentDoc) {
                    this.currentDoc.ai_status = 'analyzing';
                    this.currentDoc.ai_suggestion = null;
                }
            } catch {}
        },

        async pollDocStatus(id) {
            try {
                const res = await this.api(`/api/documents/${id}`);
                if (res.data.ai_status !== 'analyzing') {
                    clearInterval(this._aiPoll);
                    this.currentDoc = res.data;
                    this._loadSuggest(res.data);
                    this.toast(res.data.ai_suggestion
                        ? 'Re-analysis ready — review the suggested updates'
                        : 'AI analysis complete');
                }
            } catch {}
        },

        // Populate the editable suggestion form from a document's staged
        // re-analysis result. Falls back to the document's current values.
        _loadSuggest(doc) {
            const s = doc && doc.ai_suggestion;
            this.suggestForm = s ? {
                title: s.title || doc.title || '',
                domain: s.domain || doc.domain || '',
                category: s.category || doc.category || '',
                document_date: s.document_date || '',
                expiration_date: s.expiration_date || '',
                summary: s.summary || '',
                tags: (s.tags || []).join(', '),
            } : {};
        },

        async saveSuggestion() {
            if (!this.currentDoc) return;
            const f = this.suggestForm;
            const body = { clear_suggestion: true };
            if (f.title) body.title = f.title;
            if (f.domain) body.domain = f.domain;
            if (f.category) body.category = f.category;
            if (f.document_date) body.document_date = f.document_date;
            if (f.expiration_date) body.expiration_date = f.expiration_date;
            if (f.summary) body.summary = f.summary;
            body.tags = (f.tags || '').split(',').map(t => t.trim()).filter(Boolean);
            try {
                await this.api(`/api/documents/${this.currentDoc.id}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
                this.toast('Suggested updates saved');
                await this.viewDocument(this.currentDoc.id);
            } catch {}
        },

        async dismissSuggestion() {
            if (!this.currentDoc) return;
            try {
                await this.api(`/api/documents/${this.currentDoc.id}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ clear_suggestion: true }),
                });
                this.toast('Suggestion dismissed');
                await this.viewDocument(this.currentDoc.id);
            } catch {}
        },

        async markReviewed(id) {
            try {
                await this.api(`/api/documents/${id}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ review_status: 'reviewed' }),
                });
                this.toast('Marked as reviewed');
                if (this.currentDoc) this.currentDoc.review_status = 'reviewed';
                this.loadStats();
            } catch {}
        },

        // ── Actions ─────────────────────────────────────
        async updateAction(id, status) {
            try {
                await this.api(`/api/actions/${id}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status }),
                });
                this.toast(`Action ${status}`);
                // Refresh relevant lists
                if (this.view === 'actions') this.loadActions();
                if (this.view === 'home') { this.loadOverdue(); this.loadStats(); }
                if (this.view === 'detail' && this.currentDoc) this.viewDocument(this.currentDoc.id);
            } catch {}
        },

        async createAction() {
            if (!this.newActionTitle.trim()) return;
            try {
                await this.api('/api/actions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        title: this.newActionTitle,
                        description: this.newActionDesc || null,
                        domain: this.newActionDomain || null,
                        due_date: this.newActionDue || null,
                        priority: this.newActionPriority,
                    }),
                });
                this.showNewAction = false;
                this.newActionTitle = '';
                this.newActionDesc = '';
                this.newActionDomain = '';
                this.newActionPriority = 'medium';
                this.newActionDue = '';
                this.toast('Action created');
                this.loadActions();
                this.loadStats();
            } catch {}
        },

        // ── Upload ──────────────────────────────────────
        handleDrop(e) {
            this.uploadFile = e.dataTransfer.files[0];
        },

        async doUpload() {
            if (!this.uploadFile) return;
            this.uploading = true;
            const fd = new FormData();
            fd.append('file', this.uploadFile);
            if (this.uploadTitle) fd.append('title', this.uploadTitle);
            if (this.uploadDomain) fd.append('domain', this.uploadDomain);
            if (this.uploadCategory) fd.append('category', this.uploadCategory);
            if (this.uploadSubject) fd.append('subject_id', this.uploadSubject);
            if (this.uploadTags) fd.append('tags', this.uploadTags);

            try {
                const res = await this.api('/api/documents/upload', { method: 'POST', body: fd });
                this.showUpload = false;
                this.uploadFile = null;
                this.uploadTitle = '';
                this.uploadDomain = '';
                this.uploadCategory = '';
                this.uploadSubject = '';
                this.uploadTags = '';
                this.toast(`Uploaded: ${res.data.title} (AI analyzing...)`);
                this.loadDocuments();
                this.loadStats();
            } catch {}
            this.uploading = false;
        },

        // ── Subjects ────────────────────────────────────
        async createSubject() {
            if (!this.newSubjectName.trim()) return;
            try {
                await this.api('/api/subjects', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: this.newSubjectName, type: this.newSubjectType }),
                });
                this.showNewSubject = false;
                this.newSubjectName = '';
                this.toast('Subject created');
                this.loadSubjects();
            } catch {}
        },

        // ── Helpers ─────────────────────────────────────
        domainColor(d) {
            const colors = {
                medical: '#ef4444', financial: '#6366f1', auto: '#f59e0b',
                home: '#10b981', vet: '#ec4899', legal: '#8b5cf6', insurance: '#3b82f6',
            };
            return colors[d] || '#6b7280';
        },

        formatBytes(b) {
            if (!b) return '0 B';
            const units = ['B', 'KB', 'MB', 'GB'];
            let i = 0;
            let size = b;
            while (size >= 1024 && i < units.length - 1) { size /= 1024; i++; }
            return size.toFixed(i > 0 ? 1 : 0) + ' ' + units[i];
        },

        fileTypeIcon(t) {
            return { pdf: '📄', image: '🖼️', text: '📝', email: '✉️' }[t] || '📎';
        },

        formatDate(iso) {
            if (!iso) return '';
            return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        },
    };
}
</script>
