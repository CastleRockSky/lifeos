                <div class="form-group">
                    <label>Domain</label>
                    <select x-model="editDomain">
                        <option value="">None</option>
                        <template x-for="d in domains" :key="d">
                            <option :value="d" x-text="d.charAt(0).toUpperCase() + d.slice(1)"></option>
                        </template>
                    </select>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select x-model="editCategory">
                        <option value="">None</option>
                        <template x-for="c in (categories[editDomain] || [])" :key="c">
                            <option :value="c" x-text="c.replace(/_/g, ' ')"></option>
                        </template>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Subject</label>
                <select x-model="editSubject">
                    <option value="">None</option>
                    <template x-for="s in subjects" :key="s.id">
                        <option :value="s.id" x-text="s.name"></option>
                    </template>
                </select>
            </div>
            <div class="form-group">
                <label>Tags (comma-separated)</label>
                <input type="text" x-model="editTags">
            </div>
            <div style="display:flex; gap:0.5rem; justify-content:flex-end;">
                <button class="btn" @click="showEditDoc = false">Cancel</button>
                <button class="btn btn-primary" @click="saveDocEdit()">Save</button>
            </div>
        </div>
    </div>

    <!-- New Subject Modal -->
    <div class="modal-overlay" x-show="showNewSubject" @click.self="showNewSubject = false"
         x-transition style="display:none;">
        <div class="modal">
            <h3>New Subject</h3>
            <div class="form-group">
                <label>Name</label>
                <input type="text" x-model="newSubjectName">
            </div>
            <div class="form-group">
                <label>Type</label>
                <select x-model="newSubjectType">
                    <option value="person">Person</option>
                    <option value="pet">Pet</option>
                    <option value="vehicle">Vehicle</option>
                    <option value="property">Property</option>
                </select>
            </div>
            <div style="display:flex; gap:0.5rem; justify-content:flex-end;">
                <button class="btn" @click="showNewSubject = false">Cancel</button>
                <button class="btn btn-primary" @click="createSubject()">Create</button>
            </div>
        </div>
    </div>

    <!-- New Action Modal -->
    <div class="modal-overlay" x-show="showNewAction" @click.self="showNewAction = false"
         x-transition style="display:none;">
        <div class="modal">
            <h3>New Action Item</h3>
            <div class="form-group">
                <label>Title</label>
                <input type="text" x-model="newActionTitle">
            </div>
            <div class="form-group">
                <label>Description (optional)</label>
                <textarea x-model="newActionDesc" rows="2"></textarea>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:0.75rem;">
                <div class="form-group">
                    <label>Domain</label>
                    <select x-model="newActionDomain">
                        <option value="">None</option>
                        <template x-for="d in domains" :key="d">
                            <option :value="d" x-text="d.charAt(0).toUpperCase() + d.slice(1)"></option>
                        </template>
                    </select>
                </div>
                <div class="form-group">
                    <label>Priority</label>
                    <select x-model="newActionPriority">
                        <option value="low">Low</option>
                        <option value="medium" selected>Medium</option>
                        <option value="high">High</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Due Date (optional)</label>
                <input type="date" x-model="newActionDue">
            </div>
            <div style="display:flex; gap:0.5rem; justify-content:flex-end;">
                <button class="btn" @click="showNewAction = false">Cancel</button>
                <button class="btn btn-primary" @click="createAction()" :disabled="!newActionTitle.trim()">Create</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" :class="toastType" x-show="toastMsg" x-text="toastMsg"
         x-transition style="display:none;"></div>
</div>

<script>
function lifeos() {
    return {
        // State
        view: 'home',
        prevView: null,
        loading: false,
        searchQuery: '',
        lastSearchQuery: '',
        searchResults: [],
        documents: [],
        totalDocs: 0,
        page: 1,
        perPage: 20,
        filterDomain: null,
        currentDoc: null,
        subjects: [],
        stats: {},
        categories: {},
        domains: ['medical', 'financial', 'auto', 'home', 'vet', 'legal', 'insurance'],

        // Actions
        actionItems: [],
        overdueActions: [],
        actionTab: 'all',
        actionDomainFilter: null,

        // Q&A
        qaQuestion: '',
        qaAnswer: null,
        qaSources: [],
        qaLoading: false,
        qaDomain: null,

        // Review & Expirations
        reviewDocs: [],
        expirations: [],

        // Email ingestion (Phase 3)
        emailStatus: null,

        // Medical dashboard (Phase 5)
        medical: null,
        medicalSubjectName: '',

        // Financial dashboard (Phase 6)
        financial: null,

        // Modals
        showUpload: false,
        showEditDoc: false,
        showNewSubject: false,
        showNewAction: false,
        isDragover: false,

        // Upload form
        uploadFile: null,
        uploadTitle: '',
        uploadDomain: '',
        uploadCategory: '',
        uploadSubject: '',
        uploadTags: '',
        uploading: false,

        // Edit form
        editTitle: '',
        editDomain: '',
        editCategory: '',
        editSubject: '',
        editTags: '',

        // New subject
        newSubjectName: '',
        newSubjectType: 'person',

        // New action
        newActionTitle: '',
        newActionDesc: '',
        newActionDomain: '',
        newActionPriority: 'medium',
        newActionDue: '',

        // Toast
        toastMsg: '',
        toastType: '',

        async init() {
            await Promise.all([
                this.loadStats(),
                this.loadDocuments(),
                this.loadSubjects(),
                this.loadCategories(),
                this.loadOverdue(),
                this.loadExpirations(),
                this.loadEmailStatus(),
            ]);
        },

        navigate(v) {
            clearInterval(this._aiPoll);
            this.prevView = this.view;
            this.view = v;
            if (v === 'documents') this.loadDocuments();
            if (v === 'home') { this.loadStats(); this.loadDocuments(); this.loadOverdue(); this.loadExpirations(); this.loadEmailStatus(); }
            if (v === 'subjects') this.loadSubjects();
            if (v === 'actions') this.loadActions();
            if (v === 'review') this.loadReviewQueue();
            if (v === 'medical') this.loadMedical();
            if (v === 'financial') this.loadFinancial();
        },

        async api(url, opts = {}) {
            try {
                const res = await fetch(url, opts);
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    throw new Error(err.detail || err.message || res.statusText);
                }
                return await res.json();
            } catch (e) {
                this.toast(e.message, 'error');
                throw e;
            }
        },

        toast(msg, type = 'success') {
            this.toastMsg = msg;
            this.toastType = type;
            setTimeout(() => { this.toastMsg = ''; }, 3000);
        },

        // ── Data Loading ────────────────────────────────
        async loadStats() {
            try {
                const res = await this.api('/api/stats');
                this.stats = res.data;
            } catch {}
        },

        async loadDocuments() {
            this.loading = true;
            try {
                let url = `/api/documents?page=${this.page}&per_page=${this.perPage}`;
                if (this.filterDomain) url += `&domain=${this.filterDomain}`;
                const res = await this.api(url);
                this.documents = res.data;
                this.totalDocs = res.meta.total;
            } catch {}
            this.loading = false;
        },

        async loadSubjects() {
            try {
                const res = await this.api('/api/subjects');
                this.subjects = res.data;
            } catch {}
        },

        async loadCategories() {
            try {
                const res = await this.api('/api/categories');
                this.categories = res.data;
            } catch {}
        },

        async loadActions() {
            this.loading = true;
            try {
                let url = '/api/actions?per_page=50';
                if (this.actionTab === 'overdue') url = '/api/actions/overdue';
                else if (this.actionTab === 'upcoming') url = '/api/actions/upcoming';
                else if (this.actionTab === 'completed') url = '/api/actions?status=completed';
                if (this.actionDomainFilter && !url.includes('overdue') && !url.includes('upcoming')) {
                    url += `&domain=${this.actionDomainFilter}`;
                }
                const res = await this.api(url);
                this.actionItems = res.data;
            } catch {}
            this.loading = false;
        },

        async loadOverdue() {
            try {
                const res = await this.api('/api/actions/overdue');
                this.overdueActions = res.data;
            } catch {}
        },

        async loadExpirations() {
            try {
                const res = await this.api('/api/expirations?days=60');
                this.expirations = res.data;
            } catch {}
        },

        async loadReviewQueue() {
            this.loading = true;
            try {
                const res = await this.api('/api/documents/review');
                this.reviewDocs = res.data;
            } catch {}
            this.loading = false;
        },

        async loadEmailStatus() {
            try {
                const res = await fetch('/api/email/status');
                if (res.ok) this.emailStatus = (await res.json()).data;
            } catch {}
        },

        async loadMedical() {
            this.loading = true;
            try {
                // Find primary subject
                if (!this.subjects?.length) await this.loadSubjects();
                const primary = (this.subjects || []).find((s) => s.is_primary) || (this.subjects || [])[0];
                if (!primary) {
                    this.medical = null;
                    this.medicalSubjectName = '';
                    return;
                }
                this.medicalSubjectName = primary.name;
                const sid = primary.id;

                const params = (obj) => Object.entries(obj)
                    .map(([k, v]) => encodeURIComponent(k) + '=' + encodeURIComponent(v))
                    .join('&');

                const [meds, provs, labs, weightLatest, weightTrend, bpSys, bpDia, a1c, actions] = await Promise.all([
                    fetch('/api/records?record_type=medication&subject_id=' + sid).then((r) => r.json()),
                    fetch('/api/records?record_type=provider&subject_id=' + sid).then((r) => r.json()),
                    fetch('/api/records?record_type=lab_result_set&subject_id=' + sid + '&per_page=10').then((r) => r.json()),
                    fetch('/api/metrics/latest?' + params({ subject_id: sid, metric_type: 'weight' })).then((r) => r.json()),
                    fetch('/api/metrics/trend?' + params({ subject_id: sid, metric_type: 'weight', period: 'weekly' })).then((r) => r.json()),
                    fetch('/api/metrics/latest?' + params({ subject_id: sid, metric_type: 'blood_pressure_systolic' })).then((r) => r.json()),
                    fetch('/api/metrics/latest?' + params({ subject_id: sid, metric_type: 'blood_pressure_diastolic' })).then((r) => r.json()),
                    fetch('/api/metrics/latest?' + params({ subject_id: sid, metric_type: 'a1c' })).then((r) => r.json()),
                    fetch('/api/actions?domain=medical&status=pending&per_page=10').then((r) => r.json()),
                ]);

                // Adherence (still derived later — placeholder until /api/agent/health/adherence
                // is opened to the user UI; for now we leave it null and just show meds + actions.
                this.medical = {
                    medications: (meds.data || []).filter((m) => (m.data?.status || 'active') === 'active'),
                    providers: provs.data || [],
                    labs: labs.data || [],
                    weight: weightLatest.data ? { value: weightLatest.data.value_numeric, recorded_at: weightLatest.data.recorded_at } : null,
                    weightTrend: weightTrend.data || null,
                    bp: (bpSys.data && bpDia.data) ? {
                        systolic: bpSys.data.value_numeric,
                        diastolic: bpDia.data.value_numeric,
                        recorded_at: bpSys.data.recorded_at,
                    } : null,
                    a1c: a1c.data ? { value: a1c.data.value_numeric, recorded_at: a1c.data.recorded_at } : null,
                    adherence: null,
                    actions: actions.data || [],
                };
            } catch (e) {
                console.warn('loadMedical failed', e);
            } finally {
                this.loading = false;
            }
        },

        async loadFinancial() {
            this.loading = true;
            try {
                if (!this.subjects?.length) await this.loadSubjects();
                const primary = (this.subjects || []).find((s) => s.is_primary) || (this.subjects || [])[0];
                if (!primary) { this.financial = null; return; }
                this.medicalSubjectName = primary.name;
                const sid = primary.id;

                const [credit, loans, recurring, banks, taxItems, upcoming] = await Promise.all([
                    fetch('/api/records?record_type=credit_account&subject_id=' + sid).then((r) => r.json()),
                    fetch('/api/records?record_type=loan&subject_id=' + sid).then((r) => r.json()),
                    fetch('/api/records?record_type=recurring_expense&subject_id=' + sid).then((r) => r.json()),
                    fetch('/api/records?record_type=bank_account&subject_id=' + sid).then((r) => r.json()),
                    fetch('/api/records?record_type=tax_item&subject_id=' + sid).then((r) => r.json()),
                    // Upcoming payments computed server-side, but the user UI doesn't have an
                    // agent key — derive client-side from the records we just loaded.
                    Promise.resolve(null),
                ]);

                const today = new Date();
                today.setHours(0, 0, 0, 0);

                const _nextMonthlyDue = (day) => {
                    const cand = new Date(today.getFullYear(), today.getMonth(), Math.min(day, 28));
                    if (cand < today) cand.setMonth(cand.getMonth() + 1);
                    return cand;
                };
                const _next = (rec) => {
                    const d = rec.data || {};
                    if (rec.record_type === 'credit_account' && d.payment_due_date) {
                        const dd = new Date(d.payment_due_date);
                        return dd >= today ? dd : null;
                    }
                    if (rec.record_type === 'loan' && d.payment_due_day) {
                        return _nextMonthlyDue(d.payment_due_day);
                    }
                    if (rec.record_type === 'recurring_expense' && (d.frequency || 'monthly') === 'monthly' && d.due_day) {
                        return _nextMonthlyDue(d.due_day);
                    }
                    return null;
                };

                const all = [
                    ...((credit.data) || []),
                    ...((loans.data) || []),
                    ...((recurring.data) || []),
                ];
                const cutoff14 = new Date(today); cutoff14.setDate(cutoff14.getDate() + 14);
                const upcomingItems = [];
                for (const r of all) {
                    const due = _next(r);
                    if (!due || due > cutoff14) continue;
                    const d = r.data || {};
                    upcomingItems.push({
                        record_id: r.id,
                        type: r.record_type,
                        name: d.name || d.creditor || d.lender || '(unnamed)',
                        amount: d.amount ?? d.minimum_payment ?? d.monthly_payment,
                        due_date: due.toISOString().slice(0, 10),
                        days_until: Math.round((due - today) / 86400000),
                        autopay: !!d.autopay,
                        account_last_four: d.last_four,
                    });
                }
                upcomingItems.sort((a, b) => a.due_date.localeCompare(b.due_date));

                // Totals
                let totalDebt = 0, debtCredit = 0, debtLoan = 0, totalLimit = 0;
                let monthlyOblig = 0;
                for (const r of (credit.data || [])) {
                    const bal = r.data?.current_balance;
                    if (typeof bal === 'number') { totalDebt += bal; debtCredit += bal; }
                    const lim = r.data?.credit_limit;
                    if (typeof lim === 'number') totalLimit += lim;
                    if (typeof r.data?.minimum_payment === 'number') monthlyOblig += r.data.minimum_payment;
                }
                for (const r of (loans.data || [])) {
                    const bal = r.data?.current_balance;
                    if (typeof bal === 'number') { totalDebt += bal; debtLoan += bal; }
                    if (typeof r.data?.monthly_payment === 'number') monthlyOblig += r.data.monthly_payment;
                }
                for (const r of (recurring.data || [])) {
                    if ((r.data?.status || 'active') !== 'active') continue;
                    if ((r.data?.frequency || 'monthly') !== 'monthly') continue;
                    if (typeof r.data?.amount === 'number') monthlyOblig += r.data.amount;
                }

                // Debt list
                const debts = [];
                for (const r of (credit.data || [])) {
                    const d = r.data || {};
                    debts.push({
                        record_id: r.id, type: 'credit', name: d.creditor, last_four: d.last_four,
                        balance: d.current_balance, limit: d.credit_limit, minimum_payment: d.minimum_payment,
                        apr: d.apr, autopay: d.autopay,
                    });
                }
                for (const r of (loans.data || [])) {
                    const d = r.data || {};
                    debts.push({
                        record_id: r.id, type: 'loan', name: d.lender, loan_type: d.loan_type,
                        balance: d.current_balance, monthly_payment: d.monthly_payment,
                        interest_rate: d.interest_rate, autopay: d.autopay,
                    });
                }

                const accounts = [];
                for (const r of (banks.data || [])) {
                    const d = r.data || {};
                    accounts.push({
                        record_id: r.id, type: d.account_type || 'account',
                        institution: d.institution, last_four: d.last_four,
                        balance: d.balance, balance_date: d.balance_date,
                    });
                }

                const cutoff7 = new Date(today); cutoff7.setDate(cutoff7.getDate() + 7);
                const upcoming7 = upcomingItems.filter((p) => new Date(p.due_date) <= cutoff7);

                this.financial = {
                    total_debt: totalDebt,
                    debt_breakdown: { credit: debtCredit, loan: debtLoan },
                    total_credit_limit: totalLimit,
                    credit_utilization_pct: totalLimit ? Math.round((debtCredit / totalLimit) * 1000) / 10 : null,
                    monthly_obligations: monthlyOblig,
                    upcoming_payments_7d: upcoming7,
                    upcoming: upcomingItems,
                    debts,
                    accounts,
                    taxItems: (taxItems.data || []).filter((t) => (t.data?.status || 'pending') !== 'paid'),
                };
            } catch (e) {
                console.warn('loadFinancial failed', e);
            } finally {
                this.loading = false;
            }
        },

        upcoming7dTotal() {
            const arr = this.financial?.upcoming_payments_7d || [];
            const sum = arr.reduce((s, p) => s + (p.amount || 0), 0);
            return arr.length ? '$' + Math.round(sum).toLocaleString() : '';
        },

        trendArrow(t) {
            if (!t || t.direction === 'unknown' || t.direction === 'no_prior_data') return '';
            if (t.direction === 'flat') return '→ flat';
            if (t.direction === 'up') return '↑ ' + (t.change != null ? '+' + t.change : '');
            if (t.direction === 'down') return '↓ ' + (t.change != null ? t.change : '');
            return '';
        },

        isRefillSoon(dateStr) {
            if (!dateStr) return false;
            const d = new Date(dateStr);
            const days = (d - new Date()) / (1000 * 60 * 60 * 24);
            return days <= 14;
        },

        async retryEmail(id) {
            try {
                const res = await this.api('/api/email/retry/' + id, { method: 'POST' });
                const r = res.data || {};
                if (r.ok) {
                    this.toast('Email queued for retry');
                } else if (r.error === 'attachments_not_replayable') {
                    this.toast('Re-forward the original email to retry attachments', 'error');
                } else {
                    this.toast('Retry failed: ' + (r.error || 'unknown'), 'error');
                }
                this.loadEmailStatus();
            } catch {}
        },

        // ── Search ──────────────────────────────────────
        async doSearch() {
            if (!this.searchQuery.trim()) return;
            this.lastSearchQuery = this.searchQuery;
            this.loading = true;
            this.view = 'search';
            try {
                let url = `/api/search?q=${encodeURIComponent(this.searchQuery)}`;
                if (this.filterDomain) url += `&domain=${this.filterDomain}`;
                const res = await this.api(url);
                this.searchResults = res.data;
            } catch {}
            this.loading = false;
        },

        // ── Q&A ─────────────────────────────────────────
        async askAI() {
            if (!this.qaQuestion.trim()) return;
            this.qaLoading = true;
            this.qaAnswer = null;
            this.qaSources = [];
            try {
                const res = await this.api('/api/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: this.qaQuestion, domain: this.qaDomain }),
                });
                this.qaAnswer = res.data.answer;
                this.qaSources = res.data.sources || [];
            } catch {}
            this.qaLoading = false;
        },

        // ── Document Actions ────────────────────────────
        async viewDocument(id) {
            this.prevView = this.view;
            this.view = 'detail';
            this.currentDoc = null;
            try {
                const res = await this.api(`/api/documents/${id}`);
                this.currentDoc = res.data;
                this.editTitle = res.data.title || '';
                this.editDomain = res.data.domain || '';
                this.editCategory = res.data.category || '';
                this.editSubject = res.data.subject_id || '';
                this.editTags = (res.data.tags || []).join(', ');
            } catch {
                this.navigate(this.prevView || 'documents');
            }
        },

        async viewSubject(id) {
            this.filterDomain = null;
            this.page = 1;
            this.navigate('documents');
        },

        async deleteDocument(id) {
            if (!confirm('Delete this document?')) return;
            try {
                await this.api(`/api/documents/${id}`, { method: 'DELETE' });
                this.toast('Document deleted');
                this.navigate('documents');
            } catch {}
        },

        async saveDocEdit() {
            if (!this.currentDoc) return;
            const body = {};
            if (this.editTitle) body.title = this.editTitle;
            if (this.editDomain) body.domain = this.editDomain;
            if (this.editCategory) body.category = this.editCategory;
            if (this.editSubject) body.subject_id = this.editSubject;
            body.tags = this.editTags.split(',').map(t => t.trim()).filter(Boolean);

            try {
                await this.api(`/api/documents/${this.currentDoc.id}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
                this.showEditDoc = false;
                this.toast('Document updated');
                await this.viewDocument(this.currentDoc.id);
            } catch {}
        },

        async reanalyze(id) {
            try {
                await this.api(`/api/documents/${id}/reanalyze`, { method: 'POST' });
                this.toast('Re-analysis started');
                if (this.currentDoc) this.currentDoc.ai_status = 'analyzing';
            } catch {}
        },

        async pollDocStatus(id) {
            try {
                const res = await this.api(`/api/documents/${id}`);
                if (res.data.ai_status !== 'analyzing') {
                    clearInterval(this._aiPoll);
                    this.currentDoc = res.data;
                    this.toast('AI analysis complete');
                }
            } catch {}
        },

        async markReviewed(id) {
            try {
                await this.api(`/api/documents/${id}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ review_status: 'reviewed' }),
                });
                this.toast('Marked as reviewed');
                if (this.currentDoc) this.currentDoc.review_status = 'reviewed';
                this.loadStats();
            } catch {}
        },

        // ── Actions ─────────────────────────────────────
        async updateAction(id, status) {
            try {
                await this.api(`/api/actions/${id}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status }),
                });
                this.toast(`Action ${status}`);
                // Refresh relevant lists
                if (this.view === 'actions') this.loadActions();
                if (this.view === 'home') { this.loadOverdue(); this.loadStats(); }
                if (this.view === 'detail' && this.currentDoc) this.viewDocument(this.currentDoc.id);
            } catch {}
        },

        async createAction() {
            if (!this.newActionTitle.trim()) return;
            try {
                await this.api('/api/actions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        title: this.newActionTitle,
                        description: this.newActionDesc || null,
                        domain: this.newActionDomain || null,
                        due_date: this.newActionDue || null,
                        priority: this.newActionPriority,
                    }),
                });
                this.showNewAction = false;
                this.newActionTitle = '';
                this.newActionDesc = '';
                this.newActionDomain = '';
                this.newActionPriority = 'medium';
                this.newActionDue = '';
                this.toast('Action created');
                this.loadActions();
                this.loadStats();
            } catch {}
        },

        // ── Upload ──────────────────────────────────────
        handleDrop(e) {
            this.uploadFile = e.dataTransfer.files[0];
        },

        async doUpload() {
            if (!this.uploadFile) return;
            this.uploading = true;
            const fd = new FormData();
            fd.append('file', this.uploadFile);
            if (this.uploadTitle) fd.append('title', this.uploadTitle);
            if (this.uploadDomain) fd.append('domain', this.uploadDomain);
            if (this.uploadCategory) fd.append('category', this.uploadCategory);
            if (this.uploadSubject) fd.append('subject_id', this.uploadSubject);
            if (this.uploadTags) fd.append('tags', this.uploadTags);

            try {
                const res = await this.api('/api/documents/upload', { method: 'POST', body: fd });
                this.showUpload = false;
                this.uploadFile = null;
                this.uploadTitle = '';
                this.uploadDomain = '';
                this.uploadCategory = '';
                this.uploadSubject = '';
                this.uploadTags = '';
                this.toast(`Uploaded: ${res.data.title} (AI analyzing...)`);
                this.loadDocuments();
                this.loadStats();
            } catch {}
            this.uploading = false;
        },

        // ── Subjects ────────────────────────────────────
        async createSubject() {
            if (!this.newSubjectName.trim()) return;
            try {
                await this.api('/api/subjects', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: this.newSubjectName, type: this.newSubjectType }),
                });
                this.showNewSubject = false;
                this.newSubjectName = '';
                this.toast('Subject created');
                this.loadSubjects();
            } catch {}
        },

        // ── Helpers ─────────────────────────────────────
        domainColor(d) {
            const colors = {
                medical: '#ef4444', financial: '#6366f1', auto: '#f59e0b',
                home: '#10b981', vet: '#ec4899', legal: '#8b5cf6', insurance: '#3b82f6',
            };
            return colors[d] || '#6b7280';
        },

        formatBytes(b) {
            if (!b) return '0 B';
            const units = ['B', 'KB', 'MB', 'GB'];
            let i = 0;
            let size = b;
            while (size >= 1024 && i < units.length - 1) { size /= 1024; i++; }
            return size.toFixed(i > 0 ? 1 : 0) + ' ' + units[i];
        },

        formatDate(iso) {
            if (!iso) return '';
            return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        },
    };
}
</script>
